{% extends 'Guest/Head.html' %}
{% block content %}

<style>
body {
    margin: 0;
    padding: 0;
    min-height: auto;
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("https://i.pinimg.com/1200x/4d/b3/d8/4db3d8596a13d9b715261dabc8c1cec0.jpg") no-repeat center center/cover;
}

/* Center wrapper */
.worker-wrapper {
    min-height: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;   /* move card slightly down */
    padding-top: 150px;         /* small space below navbar */
    padding-bottom: 20px;
}

/* Main card (make it wider like screenshot) */
.worker-card {
    width: 650px;
    padding: 15px 20px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* Title */
.worker-card h2 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 20px;
    letter-spacing: 1px;
    color: #2e5fa3;
}

/* 2-column layout */
form {
     display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 18px;
    row-gap: 8px;
}

/* Address should take full width */
textarea {
    grid-column: 1 / span 2;
}

/* Button full width */
.btn-worker {
    grid-column: 1 / span 2;
}

/* Form labels */
.form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    color: #333;
}

/* Inputs */
.form-control {
    width: 100%;
    padding: 6px 8px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    background: #f5f7fb;
}

/* Focus effect */
.form-control:focus {
    border-color: #2e7d32;
    box-shadow: 0 0 6px rgba(46,125,50,0.4);
}

/* Button style (like screenshot) */
.btn-worker {
    width: 100%;
    padding: 8px;
    font-size: 15px;
    margin-top: 15px;
    border-radius: 30px;
    border: none;
    background: #2e5fa3;
    color: white;
    font-weight: bold;
    transition: 0.3s;
    cursor: pointer;
}

.btn-worker:hover {
    background: #1b3d73;
}
</style>

<div class="worker-wrapper">
    <div class="worker-card">
        <h2>Worker Registration</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="txt_name" placeholder="Enter Your Name"
                title="Name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter" 
                pattern="^[A-Z]+[a-zA-Z ]*$"
                class="form-control"
                       value="{{editworker.worker_name}}" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="txt_email" placeholder="Enter Your Email"  class="form-control"
                       value="{{editworker.worker_email}}" required>
            </div>

            <div class="form-group">
                <label>Contact</label>
                <input type="text" name="txt_contact" placeholder="Enter Your Contact Number" 
                pattern="[7-9]{1}[0-9]{9}" 
                title="Phone number with 7-9 and remaing 9 digit with 0-9" minlength="10" maxlength="10"
                class="form-control"
                       value="{{editworker.worker_contact}}" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="txt_address" rows="3" placeholder="Enter Your Address" class="form-control" required></textarea>
            </div>

            <div class="form-group">
                <label>Photo</label>
                <input type="file" name="txt_photo" class="form-control" required>
            </div>

            <div class="form-group">
                <label>ID Proof</label>
                <input type="file" name="txt_proof" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="txt_password" placeholder="Enter Your Password" 
                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
                title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" 
                required name="txt_pass"
                class="form-control"
                       value="{{editworker.worker_password}}" required>
            </div>

            <button type="submit" class="btn-worker">Register</button>

        </form>
    </div>
</div>

{% if msg %}
<script>
Swal.fire({
    title: "{{ title|default:'Notification' }}",
    text: "{{ msg }}",
    icon: "{{ icon|default:'success' }}",
    confirmButtonColor: "#2e7d32"
}).then(() => {
    window.location = "{% url 'Guest:WorkerRegistration' %}";
});
</script>
{% endif %}

{% endblock content %}
