{% extends 'Guest/Head.html' %}
{% block content %}

<style>
    .page-wrapper {
    padding-top: 120px;   /* push content below navbar */
    padding-bottom: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
}

    .register-card {
        width: 850px;
        padding: 25px 35px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .register-card h2 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 600;
        color: #2a5298;
    }

    .form-row {
        display: flex;
        gap: 20px;
        margin-bottom: 12px;
    }

    .form-group {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-size: 13px;
        margin-bottom: 4px;
        font-weight: 500;
    }

    .form-control {
        padding: 7px 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    textarea.form-control {
        resize: none;
    }

    .btn-register {
        width: 100%;
        padding: 8px;
        border-radius: 25px;
        border: none;
        background: #2a5298;
        color: white;
        font-weight: 600;
        margin-top: 10px;
        transition: 0.3s;
    }

    .btn-register:hover {
        background: #1e3c72;
    }

    .login-link {
        text-align: center;
        margin-top: 8px;
        font-size: 13px;
    }

    .login-link a {
        color: #2a5298;
        font-weight: 600;
        text-decoration: none;
    }
</style>

<div class="page-wrapper">
<div class="register-card">
    <h2>User Registration</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-row">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="txt_name" class="form-control" required>
            </div>

            <div class="form-group">
                <label>House No</label>
                <input type="number" name="txt_hno" class="form-control" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Contact</label>
                <input type="number" name="txt_con" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="txt_email" class="form-control" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="txt_pass" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="txt_confpass" class="form-control" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Ward</label>
                <select name="sel_ward" class="form-control" required>
                    <option value="">Select Ward</option>
                    {% for i in warddata %}
                    <option value="{{i.id}}">{{i.ward_number}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Photo</label>
                <input type="file" name="txt_photo" class="form-control" required>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="txt_address" rows="2" class="form-control" required></textarea>
        </div>

        <button type="submit" class="btn-register">Register</button>

        <div class="login-link">
            Already registered?
            <a href="{% url 'Guest:Login' %}">Login here</a>
        </div>
    </form>
</div>
</div>

{% if msg %}
<script>
Swal.fire({
    title: "{{ title|default:'Notification' }}",
    text: "{{ msg }}",
    icon: "{{ icon|default:'success' }}",
    confirmButtonColor: "#2a5298"
}).then(() => {
    window.location = "{% url 'Guest:NewUser' %}";
});
</script>
{% endif %}

{% endblock content %}
